<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histeograma</title>

    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <section>
        <div class="container">
            <h1>Tabela de Alunos</h1>
            <div class="tabela" id="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Nota</th>
                            <th>Aprovação</th>
                        </tr>
                    </thead>
                    <tbody id="table-user">

                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <section>
        <div class="container">
            <h1>Têndencia do Preço dos Imóveis(2014-2015)</h1>
            <table>
                <thead>
                    <tr>
                        <th>id</th>
                        <th>date</th>
                        <th>price</th>
                        <th>bedroom</th>
                        <th>bathrooms</th>
                        <th>sqft_living</th>
                        <th>sqft_lot</th>
                        <th>floors</th>
                    </tr>
                </thead>
                <tbody id="table-imovel"></tbody>
            </table>

            <div class="grafico">
                <canvas id="mychart"></canvas>
            </div>
        </div>
    </section>

    <template id="tmplLinha">
        <!-- MODELO -->
        <tr>
            <td class='id'></td>
            <td class='nome'></td>
            <td class='nota'></td>
            <td class='aprovacao'></td>
        </tr>
    </template>

    <template id='tmplLinha_2'>
        <tr>
            <td class="id"></td>
            <td class="date"></td>
            <td class="price"></td>
            <td class="bedrooms"></td>
            <td class="bathrooms"></td>
            <td class='sqft_living'></td>
            <td class='sqft_lot'></td>
            <td class="floors"></td>
        </tr>
    </template>

    <script type="module" src="index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</body>
</html>
