<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histeograma</title>

    <link rel="stylesheet" href="./style.css">
</head>

<body>
    
<section>
    <div class="container">
        <h1>Tabela de Alunos</h1>
        <div class="tabela" id="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Nota</th>
                        <th>Aprovação</th>
                    </tr>
                </thead>
                <tbody id="table-body">

                </tbody>
            </table>
        </div>
    </div>
</section>

<section>
    <div class="container">
        <h1>Tabela de Preços de Imóveis</h1>
    </div>
</section>

    <template id="tmplLinha">
        <!-- MODELO -->
        <tr>
            <td class='id'></td>
            <td class='nome'></td>
            <td class='nota'></td>
            <td class='aprovacao'></td>
        </tr>
    </template>
    <script src="index.js"></script>
</body>

</html>
